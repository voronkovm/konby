board:
  columns:
    - name: backlog
      wip_limit: -
    - name: refinement
      wip_limit: 5
    - name: development
      wip_limit: 3
    - name: review
      wip_limit: 2
    - name: done
      wip_limit: -

defaults:
  status_todo: todo
  status_in_progress: in_progress
  status_success: done
  status_failure: blocked

rules:
  - when:
      column:
        - backlog
        - refinement
      status: todo
      assignee: "*"
    then:
      column: refinement
      assignee: bsa

  - when:
      column: development
      assignee: coder
      status: todo
    then:
      assignee: coder

  - when:
      column: development
      assignee: qa
      status: todo
    then:
      assignee: qa

  - when:
      column: development
      assignee: coder
      status: done
    then:
      assignee: qa

  - when:
      column: development
      assignee: qa
      status: done
    then:
      column: review
      status_in_progress: todo
      assignee: "-"

  - when:
      column: review
      assignee: "*"
      status: done
    then:
      column: done
      assignee: "-"
